name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (allow warnings)
        # Temporarily disable treating warnings as errors so CI can run the unit tests
        run: dotnet build --no-restore --configuration Release -p:TreatWarningsAsErrors=false

      - name: Run unit tests (exclude integration)
        # Use --no-build because we already built above
        run: dotnet test ConsoleTest.Tests/ConsoleTest.Tests.csproj --no-build --verbosity normal --filter "Category!=Integration"